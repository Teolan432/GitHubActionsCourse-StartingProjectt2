name: Test Project
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Install 
        uses: action/set-node@v3
        with:
          node-version: 'latest'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test